<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP 私域引流服務</title>
    <style>
        body { margin: 0; background-color: #121212; color: #fff; font-family: '微軟正黑體', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .slide { display: none; width: 90%; max-width: 500px; text-align: center; animation: fadeIn 0.5s; }
        .slide.active { display: block; }
        
        /* 手機排版關鍵：圖片上方，文字下方 */
        .content-box { display: flex; flex-direction: column; gap: 20px; }
        .image-placeholder { width: 100%; height: 200px; background: #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #888; }
        
        h1 { font-size: 1.5rem; margin: 10px 0; }
        .btn { background: #fff; color: #000; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

<div class="slide active">
    <div class="content-box">
        <div class="image-placeholder">放置您的電商情境圖片</div>
        <div>
            <h1>蝦皮賣得要死要活</h1>
            <p>扣掉 15% 抽成還剩多少？ [cite: 1]</p>
        </div>
    </div>
    <div class="btn" onclick="next(1)">下一步</div>
</div>

<div class="slide">
    <div class="content-box">
        <div class="image-placeholder">放置您的服務示意圖</div>
        <div>
            <h1>電商戰友的真心話</h1>
            <p>離開蝦皮斷流量，留在蝦皮養平台 [cite: 5]。我開發了這套引流架構，把毛利留在口袋 [cite: 2]。</p>
        </div>
    </div>
    <div class="btn" onclick="next(2)">查看方案</div>
</div>

<script>
    function next(n) {
        document.querySelectorAll('.slide')[n-1].classList.remove('active');
        document.querySelectorAll('.slide')[n].classList.add('active');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP 私域引流架構</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .slide { display: none; width: 90%; max-width: 500px; text-align: center; animation: fadeIn 0.5s; }
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        button { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 20px; }
        .qr-img { width: 150px; display: block; margin: 20px auto; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 10px; background: #fff; }
    </style>
</head>
<body>

<!-- 頁面 1：痛點 -->
<div class="slide active">
    <h1>蝦皮賣得要死要活，扣掉 15% 抽成還剩多少？</h1>
    <p>離開蝦皮斷流量，留在蝦皮養平台。</p>
    <button onclick="next(1)">點擊查看解決方案</button>
</div>

<!-- 頁面 2：故事 -->
<div class="slide">
    <h1>我的五年電商心法</h1>
    <p>「這不只是系統，這是把你被抽走的利潤，重新拿回來的『引流架構』。」</p>
    <button onclick="next(2)">查看方案細節</button>
</div>

<!-- 頁面 3：方案 -->
<div class="slide">
    <h2>選擇您的啟動方案</h2>
    <div style="text-align:left; font-size: 0.9rem;">
        <p>A：基礎展示 $980<br>B：系統成交 $1,780<br>C：系列經營 $3,880 (推薦)<br>D：旗艦店鋪 $4,880<br>E：品牌官網 $5,980</p>
    </div>
    <button onclick="next(3)">進入收款與開通</button>
</div>

<!-- 頁面 4：收款與表單 -->
<div class="slide">
    <h2>最後一步：啟動服務</h2>
    <p>永豐 807 | 19201800126419</p>
    <img src="https://i.urusai.cc/It3DW.jpg" class="qr-img">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSecoAEe7VmU3IG680demJP2ewrN5kZMPvUOiacOPeg3hMpdEQ/viewform?embedded=true"></iframe>
</div>

<script>
    function next(n) {
        document.querySelectorAll('.slide')[n-1].classList.remove('active');
        document.querySelectorAll('.slide')[n].classList.add('active');
    }
</script>

</body>
</html>

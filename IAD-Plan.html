<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IAD-PLAN // ARCHIVE 2026</title>
    <style>
        body { margin: 0; background: linear-gradient(180deg, #555555 0%, #3A3A3A 100%); color: #FFFFFF; font-family: 'Helvetica', 'Arial', '微軟正黑體', sans-serif; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        #progress-bar { position: absolute; top: 0; left: 0; height: 3px; background: #FFFFFF; transition: width 0.4s ease; width: 0%; }
        
        .slide { display: none; width: 85%; max-width: 500px; height: 85vh; background: #666666; border: 1px solid #777777; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; overflow: hidden; }
        .slide.active { display: flex; }
        
        /* 比例優化核心：標題、內文、圖片階層 */
        h1 { margin: 0 0 15px 0; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; line-height: 1.2; text-align: center; flex-shrink: 0; }
        .card { background: #5a5a5a; padding: 15px; border: 1px solid #777777; margin-bottom: 15px; font-size: 1rem; color: #E0E0E0; width: 100%; box-sizing: border-box; line-height: 1.6; flex-shrink: 0; }
        .img-container { width: 100%; flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 15px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .btn { background: #FFFFFF; color: #3A3A3A; padding: 15px 0; font-weight: 900; cursor: pointer; width: 100%; border: none; text-transform: uppercase; transition: 0.3s; flex-shrink: 0; }
        .btn:hover { background: #3A3A3A; color: #FFFFFF; border: 1px solid #FFFFFF; }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<div class="slide active">
    <h1>蝦皮賣得越好，<br>你反而越窮？</h1>
    <div class="card">基本15％抽成 + 金流周轉 + 廣告成本 + 人事費用 = 白忙一場</div>
    <div class="img-container"><img src="https://i.urusai.cc/Fs4dd.png"></div>
    <div class="btn" onclick="next(1)">賣家的困境</div>
</div>

<div class="slide">
    <h1>賣家困境</h1>
    <div class="card">1. 價格太低沒利潤，太高沒流量<br>2. 廣告費灌水嚴重<br>3. 金流週轉超久<br>4. 雜費高漲</div>
    <div class="img-container"><img src="https://i.urusai.cc/SL1ei.png"></div>
    <div class="btn" onclick="next(2)">無效導流</div>
</div>

<div class="slide">
    <h1>適合人群</h1>
    <div class="card" style="font-size: 0.9rem;">
        ✅ 蝦皮/電商新手、老手<br>
        ✅ 一頁式優勢：免繁瑣註冊、一眼重點、一頁結帳
    </div>
    <div class="img-container" style="background: #4a4a4a; padding: 10px;">
        <span style="color:#aaa;">(圖片展示區)</span>
    </div>
    <div class="btn" onclick="next(5)">直覺導流</div>
</div>

<script>
    const totalSlides = 14;
    function next(n) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.slide')[n].classList.add('active');
        document.getElementById('progress-bar').style.width = ((n + 1) / totalSlides) * 100 + "%";
    }
</script>
</body>
</html>

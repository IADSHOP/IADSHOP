<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP｜私域引流架構</title>
    <style>
        /* 客萊因藍科技風背景 */
        body { 
            margin: 0; 
            background: #002FA7; /* 客萊因藍基底 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 100, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
                linear-gradient(rgba(0, 47, 167, 0.8), rgba(0, 0, 0, 0.9));
            color: #ffffff; 
            font-family: '微軟正黑體', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            /* 加入一點點網格紋理 */
            background-size: 50px 50px;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        }

        .slide { 
            display: none; width: 90%; max-width: 480px; text-align: center; 
            animation: fadeIn 0.6s ease; 
            /* 毛玻璃質感 */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
        }
        
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        h1 { font-size: 1.7rem; color: #fff; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        p { color: #d0d0d0; line-height: 1.6; margin-bottom: 20px; }
        .card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: left; margin: 15px 0; font-size: 0.9rem; }
        
        .btn { 
            background: #fff; color: #000; padding: 16px 40px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; display: inline-block; margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }
        .btn:hover { background: #deff9a; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(222, 255, 154, 0.4); }
    </style>
</head>
<body>

<div class="slide active">
    <h1>蝦皮賣得越好，你反而越窮？</h1>
    <p>15% 抽成 + 金流周轉 + 廣告成本 = 你的利潤全被平台吞了。</p>
    <div class="btn" onclick="next(1)">查看我的故事</div>
</div>

<script>
    function next(n) {
        document.querySelectorAll('.slide')[n-1].classList.remove('active');
        document.querySelectorAll('.slide')[n].classList.add('active');
    }
</script>
</body>
</html>

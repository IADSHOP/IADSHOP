<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP｜私域引流架構</title>
    <style>
        /* 1. 大背景色：冷霧灰藍漸層 */
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #CBD5E1 0%, #F2F4F5 50%, #E2E8F0 100%);
            color: #1E293B; 
            font-family: '微軟正黑體', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }

        /* 2. 中間簡報卡片區：純白漂浮感 */
        .slide { 
            display: none; 
            width: 85%; 
            max-width: 450px; 
            text-align: center; 
            animation: fadeIn 0.5s ease; 
            background: #FFFFFF;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 3. 文字色彩：深墨灰與板岩灰 */
        h1 { font-size: 1.6rem; color: #1E293B; margin-bottom: 20px; font-weight: 700; }
        p { color: #475569; line-height: 1.6; margin-bottom: 20px; font-size: 0.95rem; }
        .card { background: #F8FAFC; padding: 20px; border-radius: 12px; border: 1px solid #E2E8F0; text-align: left; margin: 15px 0; font-size: 0.9rem; color: #334155; }
        
        /* 4. 科技商務藍按鈕 */
        .btn { 
            background: #2563EB; 
            color: #fff; 
            padding: 16px 40px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            display: inline-block; 
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background: #1D4ED8; }
    </style>
</head>
<body>

<div class="slide active">
    <h1>蝦皮賣得越好，你反而越窮？</h1>
    <p>15% 抽成 + 金流周轉 + 廣告成本 = 你的利潤全被平台吞了。</p>
    <div class="btn" onclick="next(1)">查看我的故事</div>
</div>

<div class="slide">
    <h1>適合對象</h1>
    <div class="card">
        ✅ 蝦皮電商新手 / 中手 / 老手<br>
        ✅ 有明星商品、想變現的自媒體<br>
        ❌ 不適合：大品牌與高流量賣家
    </div>
    <div class="btn" onclick="next(2)">戳痛點</div>
</div>

<script>
    function next(n) {
        document.querySelectorAll('.slide')[n-1].classList.remove('active');
        document.querySelectorAll('.slide')[n].classList.add('active');
    }
</script>
</body>
</html>

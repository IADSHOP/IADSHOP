<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP｜工業冷淡敘事架構</title>
    <style>
        /* 1. 大背景：縱向漸層 */
        body { 
            margin: 0; 
            background: linear-gradient(180deg, #555555 0%, #3A3A3A 100%);
            color: #FFFFFF; 
            font-family: 'Helvetica', 'Arial', '微軟正黑體', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            position: relative;
        }

        /* 2. 電腦版專屬：兩側輔助線 */
        @media (min-width: 768px) {
            body::before, body::after {
                content: ''; position: absolute; top: 0; bottom: 0; width: 2px;
                background: rgba(255,255,255,0.2);
            }
            body::before { left: 25%; } /* 再往內靠，避免擋到手機版寬度 */
            body::after { right: 25%; }
        }

        /* 頂部進度條 */
        #progress-bar {
            position: absolute; top: 0; left: 0; height: 3px;
            background: #FFFFFF; transition: width 0.4s ease;
        }

        /* 文字細節 */
        .corner-mark { position: absolute; color: rgba(255,255,255,0.5); letter-spacing: 3px; font-weight: bold; }
        .top-left { top: 30px; left: 30px; font-size: 14px; }
        .bottom-right { bottom: 30px; right: 30px; font-size: 18px; }

        /* 中間卡片：維持原本的工業風設定 */
        .slide { 
            display: none; width: 85%; max-width: 450px; text-align: center; 
            animation: fadeIn 0.4s ease; background: #666666;
            padding: 50px 30px; border: 1px solid #777777; box-sizing: border-box;
        }
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h1 { font-size: 1.8rem; color: #FFFFFF; margin-bottom: 25px; font-weight: 900; text-transform: uppercase; }
        p { color: #D4D4D4; line-height: 1.7; margin-bottom: 25px; font-size: 1rem; }
        .card { background: #5a5a5a; padding: 20px; border: 1px solid #777777; text-align: left; margin: 20px 0; font-size: 0.9rem; color: #D4D4D4; }
        
        .btn { 
            background: #FFFFFF; color: #3A3A3A; padding: 16px 40px; 
            font-weight: 900; cursor: pointer; display: inline-block; margin-top: 20px;
            transition: 0.3s; text-transform: uppercase; border: none;
        }
        .btn:hover { background: #3A3A3A; color: #FFFFFF; border: 1px solid #FFFFFF; }
    </style>
</head>
<body>

<div id="progress-bar" style="width: 9%;"></div>
<div class="corner-mark top-left">IAD-SHOP // ARCHIVE</div>
<div class="corner-mark bottom-right" id="page-num">01 / 11</div>

<div class="slide active">
    <h1>蝦皮賣得越好，你反而越窮？</h1>
    <p>15% 抽成 + 金流周轉 + 廣告成本 = 你的利潤全被平台吞了。</p>
    <div class="btn" onclick="next(1)">查看我的故事</div>
</div>

<script>
    function next(n) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.slide')[n].classList.add('active');
        document.getElementById('progress-bar').style.width = ((n + 1) / 11) * 100 + "%";
        document.getElementById('page-num').innerText = String(n + 1).padStart(2, '0') + " / 11";
    }
</script>
</body>
</html>

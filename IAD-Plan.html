<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD PLAN // ARCHIVE 2026</title>
    <style>
        body { margin: 0; background: linear-gradient(180deg, #555555 0%, #3A3A3A 100%); color: #FFFFFF; font-family: 'Helvetica', 'Arial', '微軟正黑體', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        @media (min-width: 768px) {
            body::before, body::after { content: ''; position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.1); }
            body::before { left: 25%; } body::after { right: 25%; }
        }
        
        #progress-bar { position: absolute; top: 0; left: 0; height: 2px; background: #FFFFFF; transition: width 0.4s ease; }
        .corner-mark { position: absolute; color: rgba(255,255,255,0.5); letter-spacing: 3px; font-weight: bold; }
        .top-left { top: 30px; left: 30px; font-size: 14px; }
        .bottom-right { bottom: 30px; right: 30px; font-size: 18px; }

        .slide { display: none; width: 85%; max-width: 450px; text-align: center; animation: fadeIn 0.4s ease; background: #666666; padding: 50px 30px; border: 1px solid #777777; box-sizing: border-box; }
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h1 { font-size: 2.2rem; margin-bottom: 25px; font-weight: 900; text-transform: uppercase; line-height: 1.1; }
        p { color: #D4D4D4; line-height: 1.7; margin-bottom: 25px; font-size: 1rem; }
        
        /* 中間清單 (第一頁) */
        .list-group { margin: 30px 0; font-size: 1.1rem; color: #D4D4D4; line-height: 2.2; }
        
        .btn { background: #FFFFFF; color: #3A3A3A; padding: 16px 40px; font-weight: 900; cursor: pointer; display: inline-block; margin-top: 20px; transition: 0.3s; text-transform: uppercase; border: none; }
        .btn:hover { background: #3A3A3A; color: #FFFFFF; border: 1px solid #FFFFFF; }
    </style>
</head>
<body>

<div id="progress-bar" style="width: 9%;"></div>
<div class="corner-mark top-left">IAD-PLAN // ARCHIVE</div>
<div class="corner-mark bottom-right" id="page-num">01 / 11</div>

<div class="slide active">
    <h1>蝦皮賣得越好<br>你反而越窮？</h1>
    <div class="list-group">
        <div>15% 抽成</div>
        <div>金流周轉</div>
        <div>廣告成本</div>
        <div>人事費用</div>
        <div>＝</div>
        <div>做白工</div>
    </div>
    <div class="btn" onclick="next(1)">如何破局？</div>
</div>

<div class="slide"><h1>頁面 02</h1></div>
<div class="slide"><h1>頁面 03</h1></div>
<div class="slide"><h1>頁面 04</h1></div>
<div class="slide"><h1>頁面 05</h1></div>
<div class="slide"><h1>頁面 06</h1></div>
<div class="slide"><h1>頁面 07</h1></div>
<div class="slide"><h1>頁面 08</h1></div>
<div class="slide"><h1>頁面 09</h1></div>
<div class="slide"><h1>頁面 10</h1></div>
<div class="slide"><h1>頁面 11</h1></div>

<script>
    function next(n) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.slide')[n].classList.add('active');
        document.getElementById('progress-bar').style.width = ((n + 1) / 11) * 100 + "%";
        document.getElementById('page-num').innerText = String(n + 1).padStart(2, '0') + " / 11";
    }
</script>
</body>
</html>

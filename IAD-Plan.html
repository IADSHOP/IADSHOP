<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD PLAN // ARCHIVE 2026</title>
    <style>
        /* 全域重置與基礎佈局 */
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: linear-gradient(180deg, #555555 0%, #3A3A3A 100%);
            color: #FFFFFF; 
            font-family: 'Helvetica', 'Arial', '微軟正黑體', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            position: relative;
        }

        /* 電腦版輔助線 */
        @media (min-width: 768px) {
            body::before, body::after { content: ''; position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.1); z-index: 0; }
            body::before { left: 25%; } body::after { right: 25%; }
        }

        /* 頂部進度條 */
        #progress-bar { position: absolute; top: 0; left: 0; height: 2px; background: #FFFFFF; transition: width 0.4s ease; z-index: 10; }

        /* 標記 */
        .corner-mark { position: absolute; color: rgba(255,255,255,0.4); letter-spacing: 3px; font-weight: 900; z-index: 5; font-size: 14px; text-transform: uppercase; }
        .top-left { top: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; font-family: monospace; }

        /* 簡報卡片核心樣式 */
        .slide { 
            display: none; 
            width: 85%; 
            max-width: 450px; 
            height: 85vh; 
            background: #666666;
            border: 1px solid #777777; 
            padding: 40px 30px;
            position: relative;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }
        .slide.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 排版控制 */
        h1 { font-size: 2.2rem; margin: 0 0 30px 0; font-weight: 900; text-transform: uppercase; line-height: 1; letter-spacing: -1px; }
        .h-small { font-size: 0.8rem; color: #BBB; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        p { color: #D4D4D4; line-height: 1.6; font-size: 1rem; margin-bottom: 20px; text-align: left; }
        
        /* 第一頁專用清單 */
        .list-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin: 20px 0; }
        .list-item { font-size: 1.1rem; padding: 10px 0; border-bottom: 1px solid #777; color: #DDD; }
        .equal-sign { font-size: 1.8rem; margin: 15px 0; }

        /* 元件樣式 */
        .card { background: #555555; padding: 20px; border: 1px solid #777777; text-align: left; margin: 10px 0; font-size: 0.9rem; color: #E5E7EB; }
        .btn { background: #FFFFFF; color: #3A3A3A; padding: 18px 0; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; border: none; letter-spacing: 2px; margin-top: auto; }
        .btn:hover { background: #3A3A3A; color: #FFFFFF; border: 1px solid #FFFFFF; }
        .pay-img { width: 100%; height: 100px; object-fit: contain; background: #fff; padding: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="progress-bar" style="width: 10%;"></div>
<div class="corner-mark top-left">IAD-PLAN // ARCHIVE 2026</div>
<div class="corner-mark bottom-right" id="page-num">01 / 10</div>

<div class="slide active">
    <h1>蝦皮賣得越好<br>你反而越窮？</h1>
    <div class="list-container">
        <div class="list-item">15% 抽成</div>
        <div class="list-item">金流周轉</div>
        <div class="list-item">廣告成本</div>
        <div class="list-item">人事費用</div>
        <div class="equal-sign">＝</div>
        <div style="font-weight: 900; font-size: 1.5rem;">做白工</div>
    </div>
    <div class="btn" onclick="next(1)">如何破局？</div>
</div>

<div class="slide"><h1>聯繫客服</h1><p>...</p><div class="btn" onclick="next(0)">回首頁</div></div>

<script>
    function next(n) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.slide')[n].classList.add('active');
        document.getElementById('progress-bar').style.width = ((n + 1) / 10) * 100 + "%";
        document.getElementById('page-num').innerText = String(n + 1).padStart(2, '0') + " / 10";
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IAD-PLAN // ARCHIVE 2026</title>
    <style>
        body { margin: 0; background: linear-gradient(180deg, #555555 0%, #3A3A3A 100%); color: #FFFFFF; font-family: 'Helvetica', 'Arial', '微軟正黑體', sans-serif; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        
        #progress-bar { position: absolute; top: 0; left: 0; height: 3px; background: #FFFFFF; transition: width 0.4s ease; width: 0%; }
        .corner-mark { position: absolute; color: rgba(255,255,255,0.5); letter-spacing: 3px; font-weight: bold; }
        .top-left { top: 30px; left: 30px; font-size: 14px; }
        .bottom-right { bottom: 30px; right: 30px; font-size: 18px; }

        /* 調整 slide 容器以適應圖片比例 */
        .slide { display: none; width: 85%; max-width: 450px; height: 85vh; background: #666666; border: 1px solid #777777; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; text-align: center; overflow: hidden; }
        .slide.active { display: flex; }
        
        h1 { margin: 0 0 10px 0; font-weight: 900; text-transform: uppercase; line-height: 1.1; flex-shrink: 0; }
        .big-title { font-size: 1.8rem; margin-bottom: 10px; }
        
        .card { background: #5a5a5a; padding: 15px; border: 1px solid #777777; margin: 10px 0; font-size: 1rem; color: #D4D4D4; width: 100%; box-sizing: border-box; text-align: left; line-height: 1.6; flex-shrink: 0; }
        
        /* 圖片區塊：確保有足夠空間且不變形 */
        .img-wrapper { flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; margin: 10px 0; overflow: hidden; }
        .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .btn { background: #FFFFFF; color: #3A3A3A; padding: 15px 0; font-weight: 900; cursor: pointer; width: 100%; border: none; text-transform: uppercase; transition: 0.3s; margin-top: auto; flex-shrink: 0; }
        .btn:hover { background: #3A3A3A; color: #FFFFFF; border: 1px solid #FFFFFF; }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<div class="corner-mark top-left">IAD-PLAN // ARCHIVE</div>
<div class="corner-mark bottom-right" id="page-num">01 / 14</div>

<!-- 01 -->
<div class="slide active">
    <h1 class="big-title">蝦皮賣得越好，<br>你反而越窮？</h1>
    <div class="card">基本15％+抽成 / 金流周轉<br>廣告成本 / 人事費用<br>= 白忙一場</div>
    <div class="img-wrapper"><img src="https://i.urusai.cc/Fs4dd.png"></div>
    <div class="btn" onclick="next(1)">賣家的困境</div>
</div>

<!-- 02 -->
<div class="slide">
    <h1>賣家困境</h1>
    <div class="card">1. 價格太低沒利潤，太高沒流量<br>2. 廣告費灌水嚴重，不投沒流量<br>3. 金流週轉超久，墊錢舖貨<br>4. 雜費越來越高</div>
    <div class="img-wrapper"><img src="https://i.urusai.cc/SL1ei.png"></div>
    <div class="btn" onclick="next(2)">無效導流</div>
</div>

<!-- ...其他頁面架構保持一致... -->

<script>
    const totalSlides = 14;
    function next(n) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.slide')[n].classList.add('active');
        document.getElementById('progress-bar').style.width = ((n + 1) / totalSlides) * 100 + "%";
        document.getElementById('page-num').innerText = String(n + 1).padStart(2, '0') + " / " + String(totalSlides).padStart(2, '0');
    }
    next(0);
</script>
</body>
</html>

    <title>[IAD SHOP] BASIC CROPPED WM003</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fafafa; color: #222; }
        .container { max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; padding-bottom: 40px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .header { background-color: #111; color: #fff; text-align: center; padding: 15px; font-weight: bold; letter-spacing: 1px; font-size: 14pt; }
        .promo-banner { background-color: #fff0f0; border-top: 1px solid #ffcccc; border-bottom: 1px solid #ffcccc; padding: 12px; text-align: center; color: #d9534f; font-weight: bold; font-size: 11pt; }
        
        /* 🚀 手機原生流暢左右滑動相簿 */
        .slider-wrapper { position: relative; width: 100%; overflow: hidden; background: #000; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slider-item { flex: 0 0 100%; width: 100%; scroll-snap-align: start; position: relative; }
        .slider-img { width: 100%; display: block; height: auto; pointer-events: none; }
        .slider-hint { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 10px; font-size: 9pt; border-radius: 12px; font-weight: bold; pointer-events: none; }

        /* 📋 圖文重點特別聲明區塊 */
        .notice-section { padding: 25px 20px; background-color: #fff; border-bottom: 1px solid #eee; }
        .notice-title { font-size: 13pt; font-weight: bold; color: #111; margin-bottom: 15px; border-left: 4px solid #111; padding-left: 10px; letter-spacing: 0.5px; }
        .notice-list { padding-left: 20px; margin: 0; }
        .notice-list li { font-size: 11pt; color: #333; line-height: 1.7; margin-bottom: 10px; font-weight: 500; }
        .notice-highlight { color: #d9534f; font-weight: bold; }

        /* 🛒 整合進來的結帳填單區塊 */
        .checkout-section { padding: 25px 20px; background-color: #fcfcfc; border-top: 2px dashed #eee; text-align: center; }
        .step-title { font-size: 13pt; font-weight: bold; margin-top: 20px; margin-bottom: 10px; color: #111; text-align: left; border-left: 4px solid #00c300; padding-left: 10px; }
        .step-desc { font-size: 11pt; color: #666; text-align: left; margin-bottom: 15px; line-height: 1.5; }
        
        /* 表單按鈕 */
        .form-btn { display: block; width: 100%; background-color: #00c300; color: #fff; text-align: center; padding: 15px; font-size: 13pt; font-weight: bold; text-decoration: none; border-radius: 4px; margin: 15px 0; transition: background 0.2s; }
        .form-btn:hover { background-color: #009900; }
        
        /* LINE Pay 圖片 */
        .qr-code { width: 80%; max-width: 260px; margin: 10px auto; display: block; border: 1px solid #eee; border-radius: 8px; padding: 10px; background: #fff; }
        
        /* 溫馨核帳提示 */
        .audit-notice { background: #fff; padding: 12px; border: 1px solid #ddd; border-radius: 6px; text-align: left; font-size: 10pt; color: #555; line-height: 1.6; margin-top: 20px; }
    </style>
</head>

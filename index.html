<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[IAD SHOP] 直購結帳專區</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #fafafa; }
        .container { max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; padding-bottom: 50px; }
        .header { background-color: #111; color: #fff; text-align: center; padding: 15px; font-weight: bold; }
        .promo-banner { background: #fff0f0; color: #d9534f; padding: 15px; text-align: center; font-weight: bold; }
        
        /* 圖片滑動區塊 */
        .slider-wrapper { width: 100%; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; }
        .slider-item { flex: 0 0 100%; scroll-snap-align: start; }
        .slider-img { width: 100%; display: block; }

        /* 付款與表單區塊 */
        .section { padding: 20px; border-top: 1px solid #eee; }
        .pay-box { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-size: 14px; }
        .pay-img { width: 100%; max-width: 250px; display: block; margin-top: 10px; }
        
        /* 內嵌表單設定 */
        .form-area { margin-top: 20px; }
        iframe { width: 100%; height: 600px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">IAD SHOP</div>
    <div class="promo-banner">🔥 VIP直購價：任選 2 件享 $449 免運</div>

    <div class="slider-wrapper">
        </div>

    <div class="section">
        <h3>💳 請選擇付款方式</h3>
        <div class="pay-box">
            <p><strong>1. 銀行匯款 (ATM)</strong><br>銀行代碼：822 (中國信託)<br>帳號：1234-5678-9012</p>
        </div>
        <div class="pay-box">
            <p><strong>2. 信用卡付款</strong></p>
            <img src="https://i.urusai.cc/Y8wor.jpg" class="pay-img">
        </div>
        <div class="pay-box">
            <p><strong>3. LINE Pay</strong></p>
            <img src="https://i.urusai.cc/It3DW.jpg" class="pay-img">
        </div>
    </div>

    <div class="section form-area">
        <h3>📝 填寫收件資料</h3>
        <iframe src="你的Google表單嵌入連結"></iframe>
    </div>
</div>

</body>
</html>

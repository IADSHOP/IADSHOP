<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP - 官方直購</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #fafafa; }
        .container { max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; padding-bottom: 50px; }
        .header { background-color: #111; color: #fff; text-align: center; padding: 15px; font-weight: bold; font-size: 18px; }
        .promo-banner { background: #fff0f0; color: #d9534f; padding: 15px; text-align: center; font-weight: bold; font-size: 16px; border-bottom: 2px solid #ffcccc; }
        
        /* 圖片輪播 */
        .slider-wrapper { width: 100%; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; background: #000; }
        .slider-item { flex: 0 0 100%; scroll-snap-align: start; }
        .slider-img { width: 100%; display: block; }

        /* 表單嵌入區塊 */
        .embed-container { width: 100%; padding: 20px; box-sizing: border-box; }
        iframe { width: 100%; height: 1200px; border: none; }
        
        h3 { margin-top: 20px; padding: 10px; border-left: 4px solid #111; background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">IAD SHOP</div>
    <div class="promo-banner">🔥 VIP直購價：任選 2 件享 $449 免運</div>

    <div class="slider-wrapper">
        <div class="slider-item"><img class="slider-img" src="https://down-tw.img.susercontent.com/tw-11134207-7ra0u-mc4ztb9oqzqh1d"></div>
        <div class="slider-item"><img class="slider-img" src="https://down-tw.img.susercontent.com/tw-11134207-81ztd-mgxddg2apkw830"></div>
    </div>

    <div class="embed-container">
        <h3>📝 填寫收件資料</h3>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfjrOjrxJ5bxec29XuZos1mxfvb7HpsCCSinuYy1FD5vAp__Q/viewform?embedded=true">載入中…</iframe>
    </div>
</div>

</body>
</html>

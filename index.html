<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP - 商品資訊</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        
        /* 橫向滑動圖集 */
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 10px; margin-bottom: 30px; }
        .slider img { scroll-snap-align: center; width: 80%; border-radius: 8px; flex-shrink: 0; }
        
        /* 尺寸表與報告 */
        .info-section img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        
        .btn { display: block; background: #fff; color: #000; padding: 18px; margin: 30px 0; text-decoration: none; font-weight: bold; border-radius: 5px; text-align: center; font-size: 1.2em; }
        .footer { border-top: 1px solid #333; padding: 20px 0; font-size: 0.8em; color: #777; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>IAD SHOP</h1>
        
        <!-- 九張圖穿搭滑動區 -->
        <div class="slider">
            <img src="https://i.urusai.cc/cs3Qp.jpg">
            <img src="https://i.urusai.cc/ZrdLl.jpg">
            <img src="https://i.urusai.cc/4HKjr.jpg">
            <img src="https://i.urusai.cc/imSXD.jpg">
            <img src="https://i.urusai.cc/UNNqu.jpg">
            <img src="https://i.urusai.cc/OT2TB.jpg">
            <img src="https://i.urusai.cc/dXnTy.jpg">
            <img src="https://i.urusai.cc/D0jMW.jpg">
            <img src="https://i.urusai.cc/2TKKy.jpg">
        </div>

        <!-- 尺寸與報告 -->
        <div class="info-section">
            <h3>尺寸表與試穿報告</h3>
            <img src="https://i.urusai.cc/PtfVX.jpg">
            <img src="https://i.urusai.cc/p9s8X.jpg">
        </div>

        <a href="https://line.me/ti/p/你的LINEID" class="btn">立即私訊下單</a>
        
        <div class="footer">
            <p>IAD SHOP 客服時間：10:00 - 22:00</p>
        </div>
    </div>
</body>
</html>

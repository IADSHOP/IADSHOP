<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP | 官方訂購頁</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: #f8f8f8; }
        .container { max-width: 600px; margin: 0 auto; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .header { background: #000; color: #fff; text-align: center; padding: 20px; font-weight: 900; letter-spacing: 2px; }
        .banner { background: #ff4d4d; color: #fff; text-align: center; padding: 12px; font-weight: bold; }
        .section { padding: 20px; border-bottom: 1px solid #eee; position: relative; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid #000; padding-left: 10px; }
        
        /* 滑動容器與箭頭（完美比例、不拉伸變形） */
        .carousel-container { position: relative; width: 100%; overflow: hidden; }
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 0; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        
        .carousel img { 
            flex: 0 0 100%; 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
            scroll-snap-align: start; 
            border-radius: 8px; 
        }
        
        /* 按鈕垂直置中位置 */
        .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; padding: 12px 16px; cursor: pointer; border-radius: 50%; font-size: 18px; z-index: 10; }
        .arrow.prev { left: 10px; }
        .arrow.next { right: 10px; }

        /* 付款與表單樣式 */
        .payment-box { background: #fdfdfd; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .qr-code { width: 100%; max-width: 200px; display: block; margin: 10px auto; }
        iframe { width: 100%; height: 1200px; border: none; }
        
        .notice-list { padding-left: 20px; margin: 10px 0; font-size: 14px; color: #555; line-height: 1.8; }
        .price-list { list-style-type: none; padding-left: 0; margin: 10px 0; font-size: 14px; color: #333; line-height: 1.8; }
        .highlight { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">IAD SHOP</div>
    <div class="banner">VIP專屬直購優惠價 2件$449免運</div>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP - 官方直購</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #fafafa; }
        .container { max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; padding-bottom: 50px; }
        .header { background-color: #111; color: #fff; text-align: center; padding: 15px; font-weight: bold; }
        .promo-banner { background: #fff0f0; color: #d9534f; padding: 15px; text-align: center; font-weight: bold; }
        
        .slider-wrapper { width: 100%; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; background: #000; }
        .slider-item { flex: 0 0 100%; scroll-snap-align: start; }
        .slider-img { width: 100%; display: block; }

        .section { padding: 20px; border-top: 1px solid #eee; }
        .pay-box { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-size: 14px; }
        .pay-img { width: 100%; max-width: 250px; display: block; margin-top: 10px; }

        /* 關鍵：讓表單內嵌看起來像網站本身的一部分 */
        .embed-container { margin-top: 20px; width: 100%; overflow: hidden; }
        iframe { width: 100%; height: 950px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">IAD SHOP</div>
    <div class="promo-banner">🔥 VIP直購價：任選 2 件享 $449 免運</div>

    <div class="slider-wrapper">
        <div class="slider-item"><img class="slider-img" src="https://down-tw.img.susercontent.com/tw-11134207-7ra0u-mc4ztb9oqzqh1d"></div>
        <div class="slider-item"><img class="slider-img" src="https://down-tw.img.susercontent.com/tw-11134207-81ztd-mgxddg2apkw830"></div>
        </div>

    <div class="section">
        <h3>💳 請選擇付款方式</h3>
        <div class="pay-box"><strong>1. 銀行匯款 (ATM)</strong><br>822 中國信託 | 帳號：1234-5678-9012</div>
        <div class="pay-box"><strong>2. 信用卡付款</strong><br><img src="https://i.urusai.cc/Y8wor.jpg" class="pay-img"></div>
        <div class="pay-box"><strong>3. LINE Pay</strong><br><img src="https://i.urusai.cc/It3DW.jpg" class="pay-img"></div>
    </div>

    <div class="section embed-container">
        <h3>📝 填寫收件資料</h3>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdp6j8x4G06y-Gv72d-P_y5y7YVwG5o5-uS1d-S6oOqC5J15A/viewform?embedded=true">Loading...</iframe>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAD SHOP | 官方訂購頁</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background-color: #f8f8f8; }
        .container { max-width: 600px; margin: 0 auto; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .header { background: #000; color: #fff; text-align: center; padding: 20px; font-weight: 900; letter-spacing: 2px; }
        .banner { background: #ff4d4d; color: #fff; text-align: center; padding: 12px; font-weight: bold; }
        
        .section { padding: 20px; border-bottom: 1px solid #eee; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid #000; padding-left: 10px; }
        
        /* 輪播圖樣式 */
        .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 10px; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel img { flex: 0 0 100%; width: 100%; scroll-snap-align: start; border-radius: 8px; }

        /* 付款與表單樣式延續 */
        .payment-box { background: #fdfdfd; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .qr-code { width: 100%; max-width: 200px; display: block; margin: 10px auto; }
        .highlight { color: #d00; font-weight: bold; }
        iframe { width: 100%; height: 1200px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">IAD SHOP</div>
    <div class="banner">VIP專屬直購優惠價 2件$449免運</div>

    <div class="section">
        <div class="section-title">商品展示</div>
        <div class="carousel">
            <img src="https://i.urusai.cc/cs3Qp.jpg"><img src="https://i.urusai.cc/ZrdLl.jpg">
            <img src="https://i.urusai.cc/4HKjr.jpg"><img src="https://i.urusai.cc/imSXD.jpg">
            <img src="https://i.urusai.cc/UNNqu.jpg"><img src="https://i.urusai.cc/OT2TB.jpg">
            <img src="https://i.urusai.cc/dXnTy.jpg"><img src="https://i.urusai.cc/D0jMW.jpg">
            <img src="https://i.urusai.cc/2TKKy.jpg"><img src="https://i.urusai.cc/wpakn.jpg">
        </div>
    </div>

    <div class="section">
        <div class="section-title">尺寸表與試穿報告</div>
        <div class="carousel">
            <img src="https://i.urusai.cc/PtfVX.jpg"><img src="https://i.urusai.cc/p9s8X.jpg">
        </div>
    </div>

    <div class="section">
        <div class="section-title">付款資訊</div>
        <div class="payment-box">
            <h3>轉帳匯款 (807 永豐)</h3>
            <p>帳號：19201800126419 | 戶名：網癮中年企業社</p>
        </div>
        <div class="payment-box">
            <h3>LINEPAY 付款</h3>
            <img src="https://i.urusai.cc/It3DW.jpg" class="qr-code">
        </div>
        <div class="payment-box">
            <h3>信用卡付款</h3>
            <img src="https://i.urusai.cc/Y8wor.jpg" class="qr-code">
        </div>
    </div>

    <div class="section">
        <h2 style="text-align:center;">📝 填寫訂單資訊</h2>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfjrOjrxJ5bxec29XuZos1mxfvb7HpsCCSinuYy1FD5vAp__Q/viewform?embedded=true">載入中…</iframe>
    </div>
</div>

</body>
</html>
